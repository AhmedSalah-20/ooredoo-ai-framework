<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ooredoo AI - Auth</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ooredoo-red: #ED1C24; 
            --ooredoo-red-hover: #D11820;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            --text-main: #0f172a; 
            --text-muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-gradient); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        /* 🌟 تحديث الـ Box باش يولي Modern أكثر */
        .auth-container { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            padding: 45px 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        /* 🌟 تحديث قسم اللوجو */
        .logo-section { text-align: center; margin-bottom: 35px; }
        .logo-section img { height: 45px; margin-bottom: 15px; object-fit: contain; }
        .logo-section h2 { color: var(--text-main); font-weight: 700; font-size: 24px; letter-spacing: -0.5px; }
        .logo-section p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
        
        /* 🌟 تحديث الـ Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; transition: all 0.3s ease; }
        
        .input-wrapper input, .input-wrapper select { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            background-color: #f8fafc;
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            outline: none; 
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.3s ease; 
        }
        
        /* 🌟 الـ Focus Effect (كي تنزل على الخانة) */
        .input-wrapper input:focus, .input-wrapper select:focus {
            background-color: #ffffff;
            border-color: var(--ooredoo-red);
            box-shadow: 0 0 0 4px rgba(237, 28, 36, 0.1);
        }
        .input-wrapper:focus-within i { color: var(--ooredoo-red); }
        
        /* 🌟 تحديث الـ Bouton */
        .btn { 
            width: 100%; 
            background: var(--ooredoo-red); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(237, 28, 36, 0.2);
            margin-top: 10px;
        }
        .btn:hover { 
            background: var(--ooredoo-red-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 8px -1px rgba(237, 28, 36, 0.3);
        }
        
        /* 🌟 تحديث الـ Lien اللوطاني */
        .switch-text { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            font-weight: 500;
            cursor: pointer; 
            color: var(--text-muted); 
            transition: color 0.3s ease;
        }
        .switch-text span { color: var(--ooredoo-red); font-weight: 600; }
        .switch-text:hover span { color: var(--ooredoo-red-hover); text-decoration: underline; }
        
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; font-size: 14px; font-weight: 500; }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-section">
        <!-- عوضنا الأيقونة باللوجو الحقيقي -->
        <img src="/static/logo-ooredoo.png" alt="Ooredoo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Ooredoo_logo.svg/512px-Ooredoo_logo.svg.png'">
        <h2 id="form-title">Connexion</h2>
        <p id="form-subtitle">Accédez à votre espace AI Enterprise</p>
    </div>
    <div id="alert-box" class="alert"></div>

    <!-- LOGIN FORM -->
    <form id="login-form">
        <div class="input-group">
            <label>Email</label>
            <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="log-email" required></div>
        </div>
        <div class="input-group">
            <label>Mot de passe</label>
            <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="log-pass" required></div>
        </div>
        <button type="submit" class="btn">Sign In</button>
        <div class="switch-text" onclick="toggleForm('signup')">Nouveau sur la plateforme ? <span>Demander un accès</span></div>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display: none;">
        
        <!-- 🆕 خانة الاسم -->
        <div class="input-group">
            <label>Nom d'utilisateur</label>
            <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="sign-username" required></div>
        </div>

        <div class="input-group">
            <label>Email Ooredoo</label>
            <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="sign-email" required></div>
        </div>

        <!-- 🆕 خانات القسم والقسم الفرعي بجنب بعضهم -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="input-group" style="margin-bottom: 0; flex: 1;">
                <label>Département</label>
                <div class="input-wrapper"><i class="fas fa-building"></i><input type="text" id="sign-department" placeholder="ex: IT" required></div>
            </div>
            <div class="input-group" style="margin-bottom: 0; flex: 1;">
                <label>Sous-dépt</label>
                <div class="input-wrapper"><i class="fas fa-code-branch"></i><input type="text" id="sign-subdepartment" placeholder="ex: AI" required></div>
            </div>
        </div>

        <div class="input-group">
            <label>Rôle souhaité</label>
            <div class="input-wrapper">
                <i class="fas fa-user-tag"></i>
                <select id="sign-role">
                    <option value="MLOps Engineer">MLOps Engineer</option>
                    <option value="Administrateur">Administrateur</option>
                </select>
            </div>
        </div>
        
        <!-- 👁️ خانة المودپاس مع العين -->
        <div class="input-group">
            <label>Mot de passe</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="sign-pass" required style="padding-right: 40px;">
                <i class="fas fa-eye" onclick="togglePassword('sign-pass', this)" style="left: auto; right: 14px; cursor: pointer;"></i>
            </div>
        </div>
        
        <!-- 👁️ خانة تأكيد المودپاس مع العين -->
        <div class="input-group">
            <label>Confirmer le mot de passe</label>
            <div class="input-wrapper">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="sign-pass-confirm" required style="padding-right: 40px;">
                <i class="fas fa-eye" onclick="togglePassword('sign-pass-confirm', this)" style="left: auto; right: 14px; cursor: pointer;"></i>
            </div>
        </div>

        <button type="submit" class="btn">Soumettre la demande</button>
        <div class="switch-text" onclick="toggleForm('login')">Vous avez déjà un compte ? <span>Se connecter</span></div>
    </form>
</div>

<script>
    function toggleForm(type) {
        document.getElementById('alert-box').style.display = 'none';
        if(type === 'signup') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            document.getElementById('form-title').innerText = "Demande d'accès";
        } else {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('form-title').innerText = "Connexion";
        }
    }

    function showAlert(msg, isSuccess = false) {
        const box = document.getElementById('alert-box');
        box.innerText = msg;
        box.className = isSuccess ? 'alert alert-success' : 'alert alert-error';
        box.style.display = 'block';
    }
    // ==========================================
    // 👁️ Fonction متاع إظهار/إخفاء كلمة السر
    // ==========================================
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text"; 
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash"); 
        } else {
            input.type = "password"; 
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye"); 
        }
    }

    // ==========================================
    // 1. Submission متاع الـ Sign Up
    // ==========================================
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // لم الداتا القديمة
        const email = document.getElementById('sign-email').value;
        const role = document.getElementById('sign-role').value;
        const password = document.getElementById('sign-pass').value;
        const confirmPassword = document.getElementById('sign-pass-confirm').value;

        // 🚨 لم الداتا الجديدة
        const username = document.getElementById('sign-username').value;
        const department = document.getElementById('sign-department').value;
        const sub_department = document.getElementById('sign-subdepartment').value;

        if (password !== confirmPassword) {
            showAlert("Les mots de passe ne correspondent pas!", false);
            return;
        }

        try {
            const res = await fetch('/api/signup', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                // 🚨 بعثان الداتا الكل للباكاند
                body: JSON.stringify({ 
                    email: email, 
                    password: password, 
                    role: role,
                    username: username,
                    department: department,
                    sub_department: sub_department
                })
            });
            
            const result = await res.json();

            if(res.ok) {
                showAlert(result.message || "Demande envoyée avec succès", true);
                document.getElementById('signup-form').reset();
                setTimeout(() => toggleForm('login'), 3000);
            } else {
                if (res.status === 422 && Array.isArray(result.detail)) {
                    showAlert(result.detail[0].msg, false);
                } else {
                    showAlert(result.detail || result.message || "Erreur d'inscription", false);
                }
            }
        } catch (err) {
            showAlert("Erreur de connexion au serveur", false);
        }
    });

    // ==========================================
    // 2. Submission متاع الـ Login
    // ==========================================
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailVal = document.getElementById('log-email').value;
        const passVal = document.getElementById('log-pass').value;

        try {
            // إرسال البيانات كـ JSON
            const res = await fetch('/api/login', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailVal, password: passVal })
            });
            
            const result = await res.json();

            if(res.ok) {
                localStorage.setItem("userRole", result.role);
                localStorage.setItem("userEmail", emailVal);
                // 🚨 زدنا السطور هاذم باش نهزو الداتا للـ Dashboard
                localStorage.setItem("userName", result.username);
                localStorage.setItem("userDept", result.department);
                localStorage.setItem("userSubDept", result.sub_department);
                
                window.location.href = "/dashboard";
            } else {
                // صلحنا مشكلة الـ undefined
                showAlert(result.detail || result.message || "Erreur de connexion", false);
            }
        } catch (err) {
            showAlert("Erreur de connexion au serveur", false);
        }
    });
</script>


</body>
</html>
